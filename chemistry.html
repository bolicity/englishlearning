<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>化学复习中心 | Chemistry Review Hub</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    body { background: var(--bg); display: block; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--pink);
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .chem-header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 2px solid #93c5fd;
    }
    .chem-header h1 { 
      font-family: 'ZCOOL KuaiLe', cursive; 
      font-size: 3rem; 
      color: #2563eb;
      margin-bottom: 5px;
    }

    .category-section {
      margin-bottom: 40px;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }
    .category-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: #1e40af;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px dashed #eee;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .resource-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 15px;
      background: #fdfdfd;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
    }
    .resource-item:hover {
      background: #fff;
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
      transform: translateX(5px);
    }

    .file-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .file-info {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .file-name {
      font-weight: 700;
      font-size: 1rem;
    }
    .file-meta {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 2px;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 0.65rem;
      font-weight: 800;
    }
    .badge-pdf { background: #dbeafe; color: #2563eb; }
    .badge-ans { background: #f0fdf4; color: #22c55e; }
    .badge-special { background: #fef3c7; color: #d97706; }

    .action-arrow {
      color: #bfdbfe;
      font-weight: 900;
      transition: color 0.2s;
    }
    .resource-item:hover .action-arrow {
      color: #3b82f6;
    }

    @media (max-width: 640px) {
      .resource-item { flex-wrap: wrap; }
      .badge-row { order: 3; width: 100%; margin-top: 5px; }
      .action-arrow { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-decoration">
    <div class="bg-blob" style="background: #dbeafe;"></div>
    <div class="bg-blob" style="background: #eff6ff;"></div>
  </div>

  <div class="container">
    <a href="index.html" class="back-btn">← 返回首页</a>

    <div class="chem-header">
      <h1 class="app-title">化学复习清单</h1>
      <p style="font-weight: 700; color: var(--text-light);">中考同步资料 · 英文路径适配 · 极速加载</p>
    </div>

    <!-- 专题一：考点分析 -->
    <section class="category-section">
      <div class="category-title">📊 核心考点梳理</div>
      <div class="resource-list">
        <a href="chinese-viewer.html?file=chem_docs/chem_list.pdf" class="resource-item">
          <div class="file-icon">🧪</div>
          <div class="file-info">
            <div class="file-name">八年级化学沪科版全一册知识清单</div>
            <div class="file-meta">2025-2026学年同步精品资料</div>
          </div>
          <div class="badge-row">
            <span class="badge badge-pdf">PDF</span>
            <span class="badge badge-special">全册精华</span>
          </div>
          <div class="action-arrow">→</div>
        </a>
      </div>
    </section>

    <!-- 专题二：全真卷练习 -->
    <section class="category-section">
      <div class="category-title">📝 全真卷练习</div>
      <div class="resource-list">
        <a href="chinese-viewer.html?file=chem_docs/pt_chem_ans.pdf" class="resource-item">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">普陀区单元综合练习（解析版）</div>
            <div class="file-meta">2025-2026学年下学期实战演练</div>
          </div>
          <div class="badge-row">
            <span class="badge badge-pdf">PDF</span>
            <span class="badge badge-ans">带解析</span>
          </div>
          <div class="action-arrow">→</div>
        </a>
        <a href="chinese-viewer.html?file=chem_docs/sj_phys_ans.pdf" class="resource-item">
          <div class="file-icon">⚖️</div>
          <div class="file-info">
            <div class="file-name">松江区八年级下学期物理试卷答案解析</div>
            <div class="file-meta">物理考点专项（暂存化学区）</div>
          </div>
          <div class="badge-row">
            <span class="badge badge-pdf">PDF</span>
            <span class="badge badge-ans">参考答案</span>
          </div>
          <div class="action-arrow">→</div>
        </a>
      </div>
    </section>

    <div style="text-align: center; padding: 40px 0; color: var(--text-light); font-size: 0.8rem; border-top: 1px dashed #bfdbfe;">
      <p>© 2026 Owen Learning Center | 化学沉浸式学习计划</p>
    </div>
  </div>

  <script>
    // 自动为所有资源列表项的 href 进行 URL 编码
    document.querySelectorAll('.resource-item').forEach(item => {
      const originalHref = item.getAttribute('href');
      if (originalHref.includes('file=')) {
        const parts = originalHref.split('file=');
        const encodedFile = encodeURI(parts[1]);
        item.setAttribute('href', parts[0] + 'file=' + encodedFile);
      }
    });
  </script>
</body>
</html>
