<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沉浸式阅读器 | Owen Learning Viewer</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    body { background: #f4f4f9; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
    .viewer-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }
    .back-link { color: var(--pink); text-decoration: none; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .file-info { font-weight: 700; color: var(--text); font-size: 0.9rem; }
    
    .viewer-content { flex-grow: 1; width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px 15px; }

    .pdf-page-wrapper {
      margin-bottom: 15px;
      background: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
    }
    canvas { max-width: 100%; height: auto !important; }

    .native-viewer {
      width: 100%;
      height: calc(100vh - 100px);
      border: none;
      border-radius: 12px;
      background: white;
    }

    .fallback-panel {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin: 40px auto;
      max-width: 560px;
      padding: 24px;
      text-align: center;
    }
    .fallback-title {
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .fallback-text {
      color: var(--text-light);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .loading-overlay {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      background: #f4f4f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--pink-light);
      border-top: 4px solid var(--pink);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .controls { display: flex; gap: 10px; }
    .btn-action {
      padding: 6px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    .btn-pink { background: var(--pink); color: white; }
    .btn-gray { background: #e5e7eb; color: #374151; }
  </style>
</head>
<body>
  <nav class="viewer-nav">
    <a href="javascript:history.back()" class="back-link">← 返回列表</a>
    <div class="file-info" id="display-filename">加载中...</div>
    <div class="controls">
      <button onclick="useNativeViewer()" class="btn-action btn-gray">兼容模式</button>
      <a href="#" id="download-btn" class="btn-action btn-pink" download>下载原档</a>
    </div>
  </nav>

  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <div id="loader-text" style="margin-top:15px; font-weight:700; color:var(--text-light);">准备加载高清原文...</div>
  </div>

  <main class="viewer-content" id="render-area">
    <iframe id="pdf-frame" class="native-viewer" src=""></iframe>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const filePath = urlParams.get('file');
    const displayFilename = document.getElementById('display-filename');
    const downloadBtn = document.getElementById('download-btn');
    const pdfFrame = document.getElementById('pdf-frame');
    const loader = document.getElementById('loader');

    if (filePath) {
      const fileName = decodeURIComponent(filePath.split('/').pop());
      displayFilename.innerText = fileName;
      downloadBtn.href = filePath;
      
      // 直接设置 iframe 源
      pdfFrame.src = filePath;
      
      // 监听加载完成以隐藏加载动画
      pdfFrame.onload = () => {
        loader.style.display = 'none';
      };

      // 针对本地 file:// 协议的容错处理
      setTimeout(() => {
        loader.style.display = 'none';
      }, 2000);
    } else {
      document.getElementById('loader-text').innerText = '错误：未找到文件路径';
    }

    function useNativeViewer() {
      // 已经在原生模式了
      window.open(filePath, '_blank');
    }
  </script>
</body>
</html>
